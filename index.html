<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sushant Chat Bot</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f8ff; /* Light sky blue background */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        #chat-container { 
            width: 400px; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
        #header { 
            background-color: #87CEEB; /* Sky Blue */
            color: white; 
            padding: 15px; 
            text-align: center; 
            font-size: 1.2em; 
            font-weight: bold; 
        }
        #chat-box { 
            height: 450px; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .message { 
            max-width: 80%; 
            padding: 10px 14px; 
            border-radius: 15px; 
            line-height: 1.4; 
            word-wrap: break-word;
        }
        .user { 
            background-color: #87CEEB; /* Sky Blue for user messages */
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 3px; 
        }
        .bot { 
            background-color: #f1f1f1; 
            color: #333; 
            align-self: flex-start; 
            border-bottom-left-radius: 3px; 
        }
        #input-area { 
            display: flex; 
            padding: 15px; 
            background: white; 
            border-top: 1px solid #eee; 
        }
        input { 
            flex: 1; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 20px; 
            outline: none; 
            padding-left: 15px;
        }
        button { 
            background-color: #87CEEB; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            margin-left: 10px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold;
        }
        button:hover { 
            background-color: #00BFFF; /* Darker blue on hover */
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="header">Sushant Chat Bot</div>
        <div id="chat-box">
            <div class="message bot">Hi there! I am Sushant's AI assistant. How can I help you today?</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (!message) return;

            const chatBox = document.getElementById('chat-box');
            
            // 1. Display user's message on the screen
            chatBox.innerHTML += `<div class="message user">${message}</div>`;
            inputField.value = '';
            chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom

            // 2. Add a temporary "Thinking..." bubble for the bot
            const loadingId = 'loading-' + Date.now();
            chatBox.innerHTML += `<div class="message bot" id="${loadingId}">Typing...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // 3. Send the message to your Express server
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                
                // 4. Replace the "Typing..." text with the actual AI response
                document.getElementById(loadingId).innerText = data.reply || "Something went wrong!";
            } catch (error) {
                document.getElementById(loadingId).innerText = "Error connecting to server.";
            }
        }

        // Allow sending a message by pressing the "Enter" key
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
